<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: linear-gradient(to right,#4facfe,#00f2fe);
    text-align:center;
    color:white;
    font-family:Arial;
}
input, button {
    padding:10px;
    margin: 5px;
    border-radius:5px;
    border: none;
}
</style>
</head>
<body>
<h2>Set Your Password</h2>
<p>Hello {{name}}, your account Unique ID is <strong style="color: #1e3a8a; background: #e0f2fe; padding: 2px 5px; border-radius: 4px;">{{unique_id}}</strong></p>
<p>Please write it down, and finish securing your account below.</p>
<form method="POST" action="/save_password">
    <input type="hidden" name="user_id" value="{{user_id}}">
    <input type="hidden" name="name" value="{{name}}">
    <input type="hidden" name="premium" value="{{premium}}">
    <input type="hidden" name="policy" value="{{policy}}">
    <input type="password" name="password" placeholder="Enter Password" required><br><br>
    <button type="submit">Save Password & Continue</button>
</form>
</body>
</html>
