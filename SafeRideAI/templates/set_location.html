<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: linear-gradient(to right,#4facfe,#00f2fe);
    text-align:center;
    color:white;
    font-family:Arial;
}
input, select, button {
    padding:10px;
    margin: 5px;
    border-radius:5px;
    border: none;
}
</style>
</head>
<body>
<h2>Set Your Location</h2>
<p>Hello {{name}}, we need your risk zone to calculate your premium using AI.</p>
<form method="POST" action="/set_location">
    <input type="hidden" name="email" value="{{email}}">
    <input type="hidden" name="name" value="{{name}}">
    <input type="hidden" name="policy" value="{{policy}}">
    
    <select name="location" required>
        <option value="" disabled selected>Select Your Zone Risk</option>
        <option value="low">Low Risk (Safe Zone)</option>
        <option value="medium">Medium Risk</option>
        <option value="high">High Risk (Prone to Water Logging)</option>
    </select><br><br>

    <button type="submit">Calculate Premium</button>
</form>
</body>
</html>
