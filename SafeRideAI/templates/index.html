<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRide AI - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin:0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
            border: 1px solid rgba(255,255,255,0.18); text-align: center; width: 100%; max-width: 350px;
        }
        input {
            width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: none; outline: none; background: rgba(255,255,255,0.8);
            font-family: inherit;
        }
        button {
            width: 95%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .register-link { margin-top: 20px; font-size: 0.9rem; color: #a0aec0; }
        .register-link a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>SafeRide AI</h1>
    <p style="color:#a0aec0; margin-bottom: 25px;">Log in down below to check your wallet</p>
    <form action="/login" method="POST">
        <input type="text" name="unique_id" placeholder="Unique ID (e.g., SRA-1234)" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Secure Login</button>
    </form>
    <div class="register-link" style="margin-bottom: 10px;">
        <a href="/forgot_password">Forgot your password or Unique ID?</a>
    </div>
    <div class="register-link">
        Don't have an account? <a href="/register">Create one here</a>
    </div>
</div>
</body>
</html>
